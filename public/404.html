<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DNF — Page Not Found · Anas Nadeem</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:ital,wght@0,400;0,600;1,700;1,900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root { --accent: #e10600; --bg: #0a0a0c; --text: #f5f5f7; --dim: #9ba1a6; }
    * { box-sizing: border-box; margin: 0; }
    html, body { height: 100%; }
    body {
      background: var(--bg); color: var(--text);
      font-family: "Titillium Web", system-ui, sans-serif;
      display: grid; place-items: center; text-align: center; padding: 24px;
      overflow: hidden;
    }
    .mono { font-family: "JetBrains Mono", monospace; font-size: 11px; letter-spacing: .2em; color: var(--dim); }
    .wrap { position: relative; max-width: 640px; }
    h1 {
      font-size: clamp(90px, 22vw, 200px); line-height: .9;
      font-weight: 900; font-style: italic; text-transform: uppercase;
      color: transparent; -webkit-text-stroke: 2px rgba(245,245,247,.35);
    }
    h1 span { color: var(--accent); -webkit-text-stroke: 0; }
    h2 { font-weight: 900; font-style: italic; text-transform: uppercase; font-size: clamp(20px, 4vw, 30px); margin: 18px 0 10px; }
    p { color: var(--dim); margin-bottom: 32px; }
    .car { font-family: "JetBrains Mono", monospace; white-space: pre; color: var(--dim); font-size: 12px; margin-bottom: 8px; }
    .gravel { letter-spacing: 6px; color: #5c6166; font-size: 12px; margin-bottom: 30px; }
    a.btn {
      display: inline-block; padding: 15px 32px; background: var(--accent); color: #fff;
      font-weight: 700; font-style: italic; text-transform: uppercase; letter-spacing: .14em;
      font-size: 14px; text-decoration: none; transform: skewX(-8deg);
      box-shadow: 0 8px 40px rgba(225,6,0,.3);
    }
    a.btn span { display: inline-block; transform: skewX(8deg); }
    .flag {
      position: fixed; left: 0; right: 0; top: 0; height: 14px; opacity: .14;
      background: repeating-conic-gradient(#f5f5f7 0% 25%, transparent 0% 50%) 0 0 / 14px 14px;
    }
  </style>
</head>
<body>
  <div class="flag"></div>
  <div class="wrap">
    <div class="mono">RACE CONTROL — INCIDENT REPORT</div>
    <h1>4<span>0</span>4</h1>
    <div class="car">      ____
 ____//_||_\\____
(o)~~~beached~~~(o)</div>
    <div class="gravel">· · · gravel trap · · ·</div>
    <h2>DNF — Did Not Find.</h2>
    <p>This page went straight on at Turn 1 and ended up in the barriers.<br/>The marshals have recovered the car.</p>
    <a class="btn" href="/"><span>↩ Return To The Pits</span></a>
  </div>
</body>
</html>

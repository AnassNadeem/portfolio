name: CI

on:
  workflow_dispatch:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Type-check · Test · Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc -b --noEmit

      - name: Smoke tests
        run: npm test
        env:
          # Provide stub values so Vite env imports don't crash during tests
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder
          VITE_TURNSTILE_SITE_KEY: placeholder
          VITE_SITE_URL: https://placeholder.com

      - name: Production build
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder
          VITE_TURNSTILE_SITE_KEY: placeholder
          VITE_SITE_URL: https://placeholder.com
